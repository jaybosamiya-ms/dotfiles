# I prefer C-z as the prefix
set -g prefix C-z
unbind C-b
bind C-z send-prefix

# Nicer keybindings for setting up windows
bind t new-window
bind [ previous-window
bind ] next-window
bind '{' swap-window -t -1
bind '}' swap-window -t +1

# C-z r to reload this configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'tmux config reloaded'

# Name windows after their foreground process and refresh names promptly
setw -g automatic-rename on
setw -g automatic-rename-format '#{pane_current_command}'
setw -g allow-rename off
set -g status-interval 1

# Alt+arrows for navigation
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Alt+Shift+arrows for splitting
bind -n M-S-Left  split-window -h -b
bind -n M-S-Right split-window -h
bind -n M-S-Up    split-window -v -b
bind -n M-S-Down  split-window -v

# Enable mouse support
set -g mouse on

# Keep more scrollback history
set -g history-limit 1000000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Copy selections to the system clipboard
set -g set-clipboard on
