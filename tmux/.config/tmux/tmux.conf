# I prefer C-z as the prefix
set -g prefix C-z
unbind C-b
bind C-z send-prefix

# Nicer keybindings for setting up windows
bind t new-window
bind [ previous-window
bind ] next-window
bind '{' swap-window -t -1
bind '}' swap-window -t +1

# C-z y to copy the current selection
bind y send-keys -X copy-selection-and-cancel

# C-z r to reload this configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'tmux config reloaded'

# Name windows after their foreground process and refresh names promptly
setw -g automatic-rename on
setw -g automatic-rename-format '#{pane_current_command}'
setw -g allow-rename off
set -g status-interval 1

# Show a muted status bar at the top
set -g status-position top
set -g status on
set -g status-style 'bg=#2e3440,fg=#7b88a1'
set -g status-left-style 'bg=#2e3440,fg=#7b88a1'
set -g status-right-style 'bg=#2e3440,fg=#7b88a1'
set -g window-status-style 'bg=#2e3440,fg=#7b88a1'
set -g window-status-current-style 'bg=#3b4252,fg=#d8dee9'
set -g window-status-separator ' '

# Add a blank pane-border row below the status bar
set -g pane-border-status top
set -g pane-border-format '#[fg=default,bg=default,fill=default]'

# Alt+arrows for navigation
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Alt+Shift+arrows for splitting
bind -n M-S-Left  split-window -h -b
bind -n M-S-Right split-window -h
bind -n M-S-Up    split-window -v -b
bind -n M-S-Down  split-window -v

# Enable mouse support without copying immediately after selection
set -g mouse on
bind -T copy-mode MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode MouseUp1Pane run-shell -b -d 0.05 'hash="#"; position=$(tmux display-message -p -t "#{pane_id}" "${hash}{scroll_position}"); selection=$(tmux display-message -p -t "#{pane_id}" "${hash}{selection_present}"); if [ "$position" = 0 ] && [ "$selection" = 0 ]; then tmux send-keys -t "#{pane_id}" -X cancel; fi'
bind -T copy-mode-vi MouseUp1Pane run-shell -b -d 0.05 'hash="#"; position=$(tmux display-message -p -t "#{pane_id}" "${hash}{scroll_position}"); selection=$(tmux display-message -p -t "#{pane_id}" "${hash}{selection_present}"); if [ "$position" = 0 ] && [ "$selection" = 0 ]; then tmux send-keys -t "#{pane_id}" -X cancel; fi'
bind -T copy-mode MouseDragEnd1Pane send-keys -X stop-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection
bind -T root DoubleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-word \; send-keys -X stop-selection
bind -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X stop-selection
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X stop-selection
bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; send-keys -X stop-selection
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X stop-selection
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X stop-selection

# Keep more scrollback history
set -g history-limit 1000000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Copy selections to the system clipboard
set -g set-clipboard on
