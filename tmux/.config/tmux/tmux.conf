# I prefer C-z as the prefix
set -g prefix C-z
unbind C-b
bind C-z send-prefix

# Keep Escape responsive without breaking Alt key combinations
set -sg escape-time 10

# Nicer keybindings for setting up windows
bind t new-window -a -c '#{pane_current_path}'
bind c new-window -a -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind [ previous-window
bind ] next-window
bind '{' swap-window -t -1 \; select-window -t -1
bind '}' swap-window -t +1 \; select-window -t +1

# C-z y to copy the current selection
bind y send-keys -X copy-selection-and-cancel

# C-z r to reload this configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'tmux config reloaded'

# Name windows after their active pane's title and refresh names promptly
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{||:#{==:#{pane_title},#{host}},#{==:#{pane_title},#{host_short}}},#{b:pane_current_path},#{pane_title}}'
setw -g allow-rename off
setw -g window-status-format ' #W '
setw -g window-status-current-format ' #W '
set -g status-interval 1

# Show a muted status bar at the top
set -g status-position top
set -g status on
set -g status-style 'bg=#2e3440,fg=#7b88a1'
set -g status-left-style 'bg=#2e3440,fg=#7b88a1'
set -g status-left ''
set -g status-right-style 'bg=#2e3440,fg=#7b88a1'
set -g status-right '#{?window_zoomed_flag,ZOOM ,}#{?pane_in_mode,COPY ,}%H:%M [#{session_name}]'
set -g window-status-style 'bg=#2e3440,fg=#7b88a1'
set -g window-status-current-style 'bg=#3b4252,fg=#d8dee9'
set -g window-status-separator ' '

# Add a blank pane-border row below the status bar
set -g pane-border-status top
set -g pane-border-format '#[fg=default,bg=default,fill=default]'
set -g pane-border-lines heavy

# Let applications react to terminal and pane focus changes
set -g focus-events on

# Alt+arrows for navigation
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Alt+Shift+arrows for splitting
bind -n M-S-Left  split-window -h -b -c '#{pane_current_path}'
bind -n M-S-Right split-window -h -c '#{pane_current_path}'
bind -n M-S-Up    split-window -v -b -c '#{pane_current_path}'
bind -n M-S-Down  split-window -v -c '#{pane_current_path}'

# Enable mouse input
set -g mouse on

# Forward scrolling to applications which handle the mouse themselves. For other
# full-screen applications, send arrow keys instead of scrolling tmux history.
bind -T root WheelUpPane if-shell -F -t = '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'if-shell -F -t = "#{||:#{alternate_on},#{==:#{pane_current_command},less}}" "select-pane -t = ; send-keys -t = Up" "copy-mode -e"'
bind -T root WheelDownPane if-shell -F -t = '#{mouse_any_flag}' 'send-keys -M' 'if-shell -F -t = "#{||:#{alternate_on},#{==:#{pane_current_command},less}}" "select-pane -t = ; send-keys -t = Down"'

# Use Shift+wheel to scroll tmux history or full-screen applications 4x faster
bind -T root S-WheelUpPane if-shell -F -t = '#{||:#{alternate_on},#{==:#{pane_current_command},less}}' 'select-pane -t = ; send-keys -N 4 -t = Up' 'copy-mode -e ; send-keys -X -N 20 scroll-up'
bind -T root S-WheelDownPane if-shell -F -t = '#{||:#{alternate_on},#{==:#{pane_current_command},less}}' 'select-pane -t = ; send-keys -N 4 -t = Down'
bind -T copy-mode S-WheelUpPane select-pane \; send-keys -X -N 20 scroll-up
bind -T copy-mode-vi S-WheelUpPane select-pane \; send-keys -X -N 20 scroll-up
bind -T copy-mode S-WheelDownPane select-pane \; send-keys -X -N 20 scroll-down
bind -T copy-mode-vi S-WheelDownPane select-pane \; send-keys -X -N 20 scroll-down

# Keep dragged text selected rather than copying it immediately. A plain click
# clears the selection and leaves copy mode when already at the bottom.
bind -T copy-mode MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode MouseUp1Pane run-shell -b 'hash="#"; position=$(tmux display-message -p -t "#{pane_id}" "${hash}{scroll_position}"); selection=$(tmux display-message -p -t "#{pane_id}" "${hash}{selection_present}"); if [ "$position" = 0 ] && [ "$selection" = 0 ]; then tmux send-keys -t "#{pane_id}" -X cancel; fi'
bind -T copy-mode-vi MouseUp1Pane run-shell -b 'hash="#"; position=$(tmux display-message -p -t "#{pane_id}" "${hash}{scroll_position}"); selection=$(tmux display-message -p -t "#{pane_id}" "${hash}{selection_present}"); if [ "$position" = 0 ] && [ "$selection" = 0 ]; then tmux send-keys -t "#{pane_id}" -X cancel; fi'
bind -T copy-mode MouseDragEnd1Pane send-keys -X stop-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# Double- and triple-click to select words and lines
bind -T root SecondClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-word \; send-keys -X stop-selection
bind -T copy-mode SecondClick1Pane select-pane \; send-keys -X select-word \; send-keys -X stop-selection
bind -T copy-mode-vi SecondClick1Pane select-pane \; send-keys -X select-word \; send-keys -X stop-selection
bind -T root TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; send-keys -X stop-selection
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X stop-selection
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X stop-selection

# Keep paths and URLs together while excluding common surrounding punctuation
set -g word-separators "\"'`()[]{}<>,;|!"

# Keep more scrollback history
set -g history-limit 1000000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Copy selections to the system clipboard
set -g set-clipboard on
